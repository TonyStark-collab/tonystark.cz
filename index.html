<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TonyStark.cz | Denní info</title>
  <meta name="description" content="Stručné denní informace: den, datum, čas, svátek a počasí." />
  <style>
    :root {
      --text: #eef6ff;
      --muted: #aec0d3;
      --accent: #89dcff;
      --bg1: #050a11;
      --bg2: #0b1624;
      --menu-bg: rgba(8, 15, 24, 0.98);
      --line: rgba(255, 255, 255, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(750px 460px at -10% 8%, rgba(137,220,255,.16), transparent 60%),
        radial-gradient(560px 340px at 110% -5%, rgba(156,170,255,.15), transparent 50%),
        linear-gradient(170deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
    }

    .menu-btn {
      position: fixed;
      top: 18px;
      right: 18px;
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      z-index: 60;
    }

    .menu-btn span,
    .menu-btn span::before,
    .menu-btn span::after {
      width: 20px;
      height: 2px;
      border-radius: 2px;
      background: currentColor;
      content: "";
      display: block;
      position: relative;
    }

    .menu-btn span::before { position: absolute; top: -6px; left: 0; }
    .menu-btn span::after { position: absolute; top: 6px; left: 0; }

    .menu {
      position: fixed;
      inset: 0 0 0 auto;
      width: min(320px, 86vw);
      transform: translateX(100%);
      transition: transform .24s ease;
      background: var(--menu-bg);
      border-left: 1px solid var(--line);
      padding: 84px 16px 20px;
      overflow-y: auto;
      z-index: 55;
    }

    .menu.open { transform: translateX(0); }

    .menu a {
      display: block;
      color: var(--text);
      text-decoration: none;
      padding: 12px 12px;
      margin-bottom: 8px;
      border-radius: 10px;
      border: 1px solid transparent;
    }

    .menu a:hover { border-color: var(--line); background: rgba(255,255,255,.04); }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 50;
    }

    .overlay.show { opacity: 1; pointer-events: auto; }

    .floating-info {
      max-width: 420px;
      margin: 86px 0 0 22px;
      padding: 4px;
      line-height: 1.55;
      text-shadow: 0 3px 18px rgba(0,0,0,.35);
    }

    .title {
      margin: 0 0 8px;
      font-size: clamp(1.1rem, 2.7vw, 1.45rem);
      color: var(--accent);
      letter-spacing: .02em;
    }

    .line { margin: 2px 0; font-size: clamp(1rem, 2.3vw, 1.1rem); }
    .muted { color: var(--muted); font-size: .95rem; }

    .weather-icon {
      display: inline-block;
      margin-right: 6px;
      animation: drift 2.8s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes drift {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @media (max-width: 700px) {
      .floating-info { margin: 82px 16px 0; max-width: 92vw; }
    }
  </style>
</head>
<body>
  <button class="menu-btn" id="menuBtn" aria-label="Otevřít menu" aria-expanded="false" aria-controls="menuPanel">
    <span></span>
  </button>

  <aside class="menu" id="menuPanel" aria-label="Hlavní nabídka">
    <a href="/">Domů</a>
    <a href="/kontakt/">O mně</a>
    <a href="/aplikace/">Aplikace</a>
  </aside>
  <div class="overlay" id="overlay"></div>

  <main class="floating-info" aria-label="Denní informace">
    <h1 class="title">Dnešní informace</h1>
    <p class="line"><strong>Den:</strong> <span id="today-day">Načítám…</span></p>
    <p class="line"><strong>Datum:</strong> <span id="today-date">Načítám…</span></p>
    <p class="line"><strong>Čas:</strong> <span id="today-time">Načítám…</span></p>
    <p class="line"><strong id="holiday-label">Svátek:</strong> <span id="holiday-value">Načítám…</span></p>
    <p class="line"><strong>Počasí:</strong> <span class="weather-icon" id="weather-icon">⛅</span><span id="weather-value">Načítám počasí…</span></p>
    <p class="line muted" id="weather-meta">Lokalita: Praha, Česká republika.</p>
  </main>

        "11-1":"Felix","11-2":"Tobiáš","11-3":"Hubert","11-4":"Karel","11-5":"Miriam","11-6":"Liběna","11-7":"Saskie","11-8":"Bohumír","11-9":"Bohdan","11-10":"Evžen","11-11":"Martin","11-12":"Benedikt","11-13":"Tibor","11-14":"Sáva","11-15":"Leopold","11-16":"Otmar","11-17":"Mahulena","11-18":"Romana","11-19":"Alžběta","11-20":"Nikola","11-21":"Albert","11-22":"Cecílie","11-23":"Klement","11-24":"Emílie","11-25":"Kateřina","11-26":"Artur","11-27":"Xenie","11-28":"René","11-29":"Zina","11-30":"Ondřej",
        "12-1":"Iva","12-2":"Blanka","12-3":"Svatoslav","12-4":"Barbora","12-5":"Jitka","12-6":"Mikuláš","12-7":"Ambrož","12-8":"Květoslava","12-9":"Vratislav","12-10":"Julie","12-11":"Dana","12-12":"Simona","12-13":"Lucie","12-14":"Lýdie","12-15":"Radana","12-16":"Albína","12-17":"Daniel","12-18":"Miloslav","12-19":"Ester","12-20":"Dagmar","12-21":"Natálie","12-22":"Šimon","12-23":"Vlasta","12-24":"Adam a Eva","12-25":"Boží hod vánoční","12-26":"Štěpán","12-27":"Žaneta","12-28":"Bohumila","12-29":"Judita","12-30":"David","12-31":"Silvestr"

      const stateHolidays = {
        "1-1":"Nový rok / Den obnovy samostatného českého státu",
        "5-1":"Svátek práce",
        "5-8":"Den vítězství",
        "7-5":"Den slovanských věrozvěstů Cyrila a Metoděje",
        "7-6":"Den upálení mistra Jana Husa",
        "9-28":"Den české státnosti",
        "10-28":"Den vzniku samostatného československého státu",
        "11-17":"Den boje za svobodu a demokracii",
        "12-24":"Štědrý den",
        "12-25":"1. svátek vánoční",
        "12-26":"2. svátek vánoční"
      };

      const dayEl = document.getElementById("today-day");
      const dateEl = document.getElementById("today-date");
      const timeEl = document.getElementById("today-time");
      const holidayLabelEl = document.getElementById("holiday-label");
      const holidayValueEl = document.getElementById("holiday-value");
      const weatherIconEl = document.getElementById("weather-icon");
      const weatherValueEl = document.getElementById("weather-value");
      const weatherMetaEl = document.getElementById("weather-meta");

      function updateDateTime() {
        const now = new Date();
        const key = `${now.getMonth() + 1}-${now.getDate()}`;
        const dayText = new Intl.DateTimeFormat("cs-CZ", { weekday: "long" }).format(now);
        const dateText = new Intl.DateTimeFormat("cs-CZ", {
          day: "numeric",
          month: "long",
          year: "numeric"
        }).format(now);
        const timeText = new Intl.DateTimeFormat("cs-CZ", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        }).format(now);

        dayEl.textContent = dayText.charAt(0).toUpperCase() + dayText.slice(1);
        dateEl.textContent = dateText;
        timeEl.textContent = timeText;

        const holiday = stateHolidays[key];
        if (holiday) {
          holidayLabelEl.textContent = "Státní svátek:";
          holidayValueEl.textContent = holiday;
        } else {
          holidayLabelEl.textContent = "Svátek:";
          holidayValueEl.textContent = namedays[key] || "Dnes není svátek v přehledu.";
        }
      }

      function weatherVisual(code, isDay) {
        if (code === 0) return { icon: isDay ? "☀️" : "🌙", text: isDay ? "Jasno" : "Jasná noc" };
        if ([1,2,3].includes(code)) return { icon: "⛅", text: "Polojasno až oblačno" };
        if ([45,48].includes(code)) return { icon: "🌫️", text: "Mlha" };
        if ([51,53,55,61,63,65,80,81,82].includes(code)) return { icon: "🌧️", text: "Déšť" };
        if ([71,73,75,77,85,86].includes(code)) return { icon: "🌨️", text: "Sněžení" };
        if ([95,96,99].includes(code)) return { icon: "⛈️", text: "Bouřky" };
        return { icon: "🌤️", text: "Proměnlivo" };
      }

      async function updateWeather() {
        const location = {
          name: "Praha, Česká republika",
          lat: 50.0755,
          lon: 14.4378,
          timezone: "Europe/Prague"
        };

        try {
          const url = `https://api.open-meteo.com/v1/forecast?latitude=${location.lat}&longitude=${location.lon}&current=temperature_2m,weather_code,wind_speed_10m,is_day&timezone=${encodeURIComponent(location.timezone)}`;
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();

          if (!data || !data.current) throw new Error("Chybí current data");

          const current = data.current;
          const visual = weatherVisual(Number(current.weather_code), Number(current.is_day) === 1);
          const stamp = new Intl.DateTimeFormat("cs-CZ", { hour: "2-digit", minute: "2-digit", second: "2-digit" }).format(new Date());

          weatherIconEl.textContent = visual.icon;
          weatherValueEl.textContent = `${visual.text}, ${Math.round(current.temperature_2m)} °C, vítr ${Math.round(current.wind_speed_10m)} km/h`;
          weatherMetaEl.textContent = `Lokalita: ${location.name}. Aktualizace: ${stamp}.`;
        } catch (err) {
          weatherIconEl.textContent = "⚠️";
          weatherValueEl.textContent = "Počasí se teď nepodařilo načíst.";
          weatherMetaEl.textContent = "Lokalita: Praha, Česká republika.";
        }
      }

      const menuBtn = document.getElementById("menuBtn");
      const menuPanel = document.getElementById("menuPanel");
      const overlay = document.getElementById("overlay");

      function setMenu(open) {
        menuPanel.classList.toggle("open", open);
        overlay.classList.toggle("show", open);
        menuBtn.setAttribute("aria-expanded", String(open));
      }

      menuBtn.addEventListener("click", () => setMenu(!menuPanel.classList.contains("open")));
      overlay.addEventListener("click", () => setMenu(false));
      menuPanel.querySelectorAll("a").forEach((a) => a.addEventListener("click", () => setMenu(false)));

      updateDateTime();
      updateWeather();
      setInterval(updateDateTime, 1000);
      setInterval(updateWeather, 10 * 60 * 1000);
    })();
  </script>
</body>
</html>
