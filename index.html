<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TonyStark.cz | Denní panel</title>
  <meta name="description" content="Denní informační panel: den, datum, čas, svátek a počasí pro zvolenou lokalitu." />
  <style>
    :root{
      --bg:#060b12;
      --bg-soft:#0f1722;
      --card:#122133;
      --line:rgba(255,255,255,.12);
      --text:#f3f8ff;
      --text-soft:#d5e3f2;
      --muted:#9bb1c6;
      --accent:#72d8ff;
      --accent-2:#9fa9ff;
      --ok:#7ef0c0;
      --radius:22px;
      --shadow:0 18px 42px rgba(0,0,0,.32);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 540px at -10% 12%, rgba(114,216,255,.14), transparent 52%),
        radial-gradient(860px 500px at 112% 0%, rgba(159,169,255,.16), transparent 46%),
        linear-gradient(180deg, #060b12 0%, #08131e 55%, #050a11 100%);
      display:flex;
      justify-content:center;
      padding:26px 16px 34px;
    }

    .app{
      width:min(960px, 100%);
      position:relative;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
      letter-spacing:.02em;
    }

    .brand-mark{
      width:36px;
      height:36px;
      border-radius:12px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      color:#07131c;
      box-shadow:0 10px 26px rgba(114,216,255,.24);
    }

    .menu-btn{
      width:46px;
      height:46px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--text);
      cursor:pointer;
      display:grid;
      place-items:center;
    }

    .menu-btn span,
    .menu-btn span::before,
    .menu-btn span::after{
      display:block;
      width:20px;
      height:2px;
      border-radius:2px;
      background:currentColor;
      content:"";
      transition:.25s ease;
      position:relative;
    }
    .menu-btn span::before{position:absolute; top:-6px; left:0}
    .menu-btn span::after{position:absolute; top:6px; left:0}

    .menu{
      position:fixed;
      top:0;
      right:0;
      width:min(320px, 86vw);
      height:100vh;
      padding:80px 18px 24px;
      background:rgba(9,15,23,.97);
      border-left:1px solid var(--line);
      transform:translateX(102%);
      transition:transform .28s ease;
      overflow-y:auto;
      z-index:40;
    }

    .menu.open{transform:translateX(0)}

    .menu a{
      display:block;
      padding:14px 14px;
      border-radius:12px;
      color:var(--text-soft);
      text-decoration:none;
      border:1px solid transparent;
      margin-bottom:8px;
    }
    .menu a:hover{background:rgba(255,255,255,.04); border-color:var(--line)}

    .backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      opacity:0;
      pointer-events:none;
      transition:opacity .25s ease;
      z-index:35;
    }
    .backdrop.show{opacity:1; pointer-events:auto}

    .panel{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }

    .panel h1{
      margin:0 0 18px;
      font-size:clamp(1.6rem, 3.8vw, 2.4rem);
      letter-spacing:-.03em;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px;
    }

    .item{
      border:1px solid rgba(255,255,255,.09);
      border-radius:14px;
      background:rgba(255,255,255,.02);
      padding:14px;
    }

    .item.wide{grid-column:1 / -1}
    .label{display:block; color:var(--muted); font-size:.82rem; margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em}
    .value{font-size:1.14rem; color:var(--text-soft); line-height:1.5}
    .value.strong{font-size:1.38rem; color:var(--text); font-weight:700}

    .weather{
      margin-top:18px;
      border:1px solid rgba(255,255,255,.09);
      border-radius:16px;
      padding:16px;
      background:rgba(255,255,255,.02);
      display:grid;
      grid-template-columns:auto 1fr;
      gap:14px;
      align-items:center;
    }

    .weather-icon{
      width:74px;
      height:74px;
      border-radius:16px;
      display:grid;
      place-items:center;
      font-size:2rem;
      background:linear-gradient(180deg, rgba(114,216,255,.22), rgba(159,169,255,.14));
      position:relative;
      overflow:hidden;
      animation:float 3.1s ease-in-out infinite;
    }

    .weather-icon.rain::after{
      content:"";
      position:absolute;
      inset:12px 18px;
      background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.7) 0,
        rgba(255,255,255,.7) 5px,
        transparent 5px,
        transparent 12px
      );
      animation:rain 1.1s linear infinite;
      opacity:.45;
    }

    .weather-meta strong{display:block; font-size:1.28rem; margin-bottom:4px}
    .weather-meta span{display:block; color:var(--text-soft); margin-top:2px}

    .status{margin-top:10px; color:var(--ok); font-size:.9rem}

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-4px)}
    }
    @keyframes rain{
      from{transform:translateY(0)}
      to{transform:translateY(12px)}
    }

    @media (max-width:700px){
      .panel{padding:18px}
      .grid{grid-template-columns:1fr}
      .weather{grid-template-columns:1fr; text-align:center}
      .weather-icon{margin:0 auto}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">T</span>
        <span>TonyStark.cz</span>
      </div>
      <button class="menu-btn" id="menuBtn" aria-label="Otevřít menu" aria-expanded="false" aria-controls="menuPanel">
        <span></span>
      </button>
    </header>

    <aside class="menu" id="menuPanel" aria-label="Rolovací nabídka">
      <a href="/">Domů</a>
      <a href="/#o-mne">O mně</a>
      <a href="/aplikace/">Aplikace</a>
    </aside>
    <div class="backdrop" id="backdrop"></div>

    <main class="panel" id="o-mne">
      <h1>Denní informační panel</h1>
      <section class="grid" aria-label="Datum a svátky">
        <article class="item">
          <span class="label">Den</span>
          <span class="value strong" id="today-day">—</span>
        </article>
        <article class="item">
          <span class="label">Datum</span>
          <span class="value" id="today-date">—</span>
        </article>
        <article class="item wide">
          <span class="label">Čas</span>
          <span class="value strong" id="today-time">—</span>
        </article>
        <article class="item wide">
          <span class="label" id="holiday-label">Svátek</span>
          <span class="value" id="holiday-info">—</span>
        </article>
      </section>

      <section class="weather" aria-label="Počasí" id="weatherBox">
        <div class="weather-icon" id="weatherIcon" aria-hidden="true">⛅</div>
        <div class="weather-meta">
          <strong id="weatherTitle">Načítám počasí…</strong>
          <span id="weatherTemp">—</span>
          <span id="weatherWind">—</span>
          <span id="weatherTime">—</span>
        </div>
      </section>
      <div class="status" id="status">Lokalita: Praha, Česká republika.</div>
    </main>
  </div>

      "12-1":"Iva","12-2":"Blanka","12-3":"Svatoslav","12-4":"Barbora","12-5":"Jitka","12-6":"Mikuláš","12-7":"Ambrož","12-8":"Květoslava","12-9":"Vratislav","12-10":"Julie","12-11":"Dana","12-12":"Simona","12-13":"Lucie","12-14":"Lýdie","12-15":"Radana","12-16":"Albína","12-17":"Daniel","12-18":"Miloslav","12-19":"Ester","12-20":"Dagmar","12-21":"Natálie","12-22":"Šimon","12-23":"Vlasta","12-24":"Adam a Eva","12-25":"Boží hod vánoční","12-26":"Štěpán","12-27":"Žaneta","12-28":"Bohumila","12-29":"Judita","12-30":"David","12-31":"Silvestr"
    };

    const stateHolidays = {
      "1-1":"Nový rok / Den obnovy samostatného českého státu",
      "5-1":"Svátek práce",
      "5-8":"Den vítězství",
      "7-5":"Den slovanských věrozvěstů Cyrila a Metoděje",
      "7-6":"Den upálení mistra Jana Husa",
      "9-28":"Den české státnosti",
      "10-28":"Den vzniku samostatného československého státu",
      "11-17":"Den boje za svobodu a demokracii",
      "12-24":"Štědrý den",
      "12-25":"1. svátek vánoční",
      "12-26":"2. svátek vánoční"
    };

    const dayEl = document.getElementById("today-day");
    const dateEl = document.getElementById("today-date");
    const timeEl = document.getElementById("today-time");
    const holidayLabelEl = document.getElementById("holiday-label");
    const holidayInfoEl = document.getElementById("holiday-info");

    function updateDateTime() {
      const now = new Date();
      const key = `${now.getMonth() + 1}-${now.getDate()}`;
      const dayName = new Intl.DateTimeFormat("cs-CZ", { weekday: "long" }).format(now);
      const dateText = new Intl.DateTimeFormat("cs-CZ", {
        day: "numeric",
        month: "long",
        year: "numeric"
      }).format(now);
      const timeText = new Intl.DateTimeFormat("cs-CZ", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      }).format(now);

      const holiday = stateHolidays[key];
      if (holiday) {
        holidayLabelEl.textContent = "Státní svátek";
        holidayInfoEl.textContent = holiday;
      } else {
        holidayLabelEl.textContent = "Svátek";
        holidayInfoEl.textContent = namedays[key] || "Dnes není svátek uveden v přehledu.";
      }

      dayEl.textContent = dayName.charAt(0).toUpperCase() + dayName.slice(1);
      dateEl.textContent = dateText;
      timeEl.textContent = timeText;
    }

    const location = {
      name: "Praha, Česká republika",
      latitude: 50.0755,
      longitude: 14.4378,
      timezone: "Europe/Prague"
    };

    function getWeatherVisual(code, isDay) {
      if ([0].includes(code)) {
        return { icon: isDay ? "☀️" : "🌙", text: isDay ? "Jasno" : "Jasná noc", rain: false };
      }
      if ([1, 2, 3].includes(code)) {
        return { icon: "⛅", text: "Polojasno až oblačno", rain: false };
      }
      if ([45, 48].includes(code)) {
        return { icon: "🌫️", text: "Mlha", rain: false };
      }
      if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) {
        return { icon: "🌧️", text: "Déšť", rain: true };
      }
      if ([56, 57, 66, 67, 71, 73, 75, 77, 85, 86].includes(code)) {
        return { icon: "🌨️", text: "Srážky / sněžení", rain: true };
      }
      if ([95, 96, 99].includes(code)) {
        return { icon: "⛈️", text: "Bouřky", rain: true };
      }
      return { icon: "🌤️", text: "Proměnlivo", rain: false };
    }

    async function updateWeather() {
      const weatherTitle = document.getElementById("weatherTitle");
      const weatherTemp = document.getElementById("weatherTemp");
      const weatherWind = document.getElementById("weatherWind");
      const weatherTime = document.getElementById("weatherTime");
      const weatherIcon = document.getElementById("weatherIcon");
      const status = document.getElementById("status");

      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${location.latitude}&longitude=${location.longitude}&current=temperature_2m,weather_code,wind_speed_10m,is_day&timezone=${encodeURIComponent(location.timezone)}`;
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error("Nepodařilo se načíst počasí");

        const data = await response.json();
        const current = data.current;
        const weather = getWeatherVisual(current.weather_code, current.is_day === 1);

        weatherTitle.textContent = weather.text;
        weatherTemp.textContent = `Teplota: ${Math.round(current.temperature_2m)} °C`;
        weatherWind.textContent = `Vítr: ${Math.round(current.wind_speed_10m)} km/h`;
        weatherTime.textContent = `Aktualizace: ${new Intl.DateTimeFormat("cs-CZ", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        }).format(new Date(current.time))}`;

        weatherIcon.textContent = weather.icon;
        weatherIcon.classList.toggle("rain", weather.rain);
        status.textContent = `Lokalita: ${location.name}.`;
      } catch (error) {
        weatherTitle.textContent = "Počasí je dočasně nedostupné";
        weatherTemp.textContent = "Zkuste obnovit stránku.";
        weatherWind.textContent = "";
        weatherTime.textContent = "";
        status.textContent = "Nepodařilo se načíst online data počasí.";
      }
    }

    const menuBtn = document.getElementById("menuBtn");
    const menuPanel = document.getElementById("menuPanel");
    const backdrop = document.getElementById("backdrop");

    function toggleMenu(forceOpen) {
      const open = typeof forceOpen === "boolean" ? forceOpen : !menuPanel.classList.contains("open");
      menuPanel.classList.toggle("open", open);
      backdrop.classList.toggle("show", open);
      menuBtn.setAttribute("aria-expanded", String(open));
      document.body.style.overflow = open ? "hidden" : "";
    }

    menuBtn.addEventListener("click", () => toggleMenu());
    backdrop.addEventListener("click", () => toggleMenu(false));
    menuPanel.querySelectorAll("a").forEach((link) => {
      link.addEventListener("click", () => toggleMenu(false));
    });

    updateDateTime();
    updateWeather();
    setInterval(updateDateTime, 1000);
    setInterval(updateWeather, 10 * 60 * 1000);
  </script>
</body>
</html>
