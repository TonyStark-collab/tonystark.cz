<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TonyStark.cz | Info panel</title>
  <meta name="description" content="Denní informace: den, datum, čas, státní svátek a svátek jmen." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #121418;
      --surface: #181b21;
      --line: #2b313c;
      --text: #eceff5;
      --text-soft: #c4cad6;
      --muted: #98a3b8;
      --max: 860px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      line-height: 1.7;
      padding: 20px 16px 48px;
    }

    .page {
      width: min(var(--max), 100%);
      margin: 0 auto;
      display: grid;
      gap: 28px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      padding: 10px;
    }

    .brand,
    .menu a {
      color: var(--text-soft);
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 9px;
      border: 1px solid transparent;
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .brand {
      color: var(--text);
      font-weight: 600;
    }

    .menu {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .brand:hover,
    .brand:focus-visible,
    .menu a:hover,
    .menu a:focus-visible {
      color: var(--text);
      border-color: var(--line);
      outline: none;
    }

    main {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      padding: clamp(20px, 4.4vw, 36px);
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(1.6rem, 4.6vw, 2.2rem);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      background: #1c2028;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .label {
      display: block;
      text-transform: uppercase;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .value {
      margin: 0;
      color: var(--text-soft);
      font-size: 1.08rem;
    }

    .silny {
      color: var(--text);
      font-size: clamp(1.2rem, 3.2vw, 1.5rem);
      font-weight: 600;
    }

    @media (max-width: 660px) {
      .grid { grid-template-columns: 1fr; }
      .brand { width: 100%; }
      body { padding-top: 14px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav" aria-label="Hlavní navigace">
      <a class="brand" href="/">TonyStark.cz</a>
      <div class="menu">
        <a href="/o-mne/">O mně</a>
        <a href="/info-panel/" aria-current="page">Info panel</a>
      </div>
    </nav>

    <main>
      <h1>Info panel</h1>
      <section class="grid" aria-label="Denní informace">
        <article class="item">
          <span class="label">Den v týdnu</span>
          <p class="value silny" id="today-day">-</p>
        </article>
        <article class="item">
          <span class="label">Datum</span>
          <p class="value" id="today-date">-</p>
        </article>
        <article class="item wide">
          <span class="label">Čas</span>
          <p class="value silny" id="today-time">-</p>
        </article>
        <article class="item wide">
          <span class="label" id="holiday-label">Státní svátek</span>
          <p class="value" id="holiday-info">-</p>
        </article>
      </section>
    </main>
  </div>

    const holidayLabelEl = document.getElementById("holiday-label");
    const holidayInfoEl = document.getElementById("holiday-info");

    function updateDateTime() {
      const now = new Date();
      const key = `${now.getMonth() + 1}-${now.getDate()}`;
      const dayName = new Intl.DateTimeFormat("cs-CZ", { weekday: "long" }).format(now);
      const dateText = new Intl.DateTimeFormat("cs-CZ", {
        day: "numeric",
        month: "long",
        year: "numeric"
      }).format(now);
      const timeText = new Intl.DateTimeFormat("cs-CZ", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      }).format(now);

      const stateHoliday = stateHolidays[key];
      if (stateHoliday) {
        holidayLabelEl.textContent = "Státní svátek";
        holidayInfoEl.textContent = stateHoliday;
      } else {
        holidayLabelEl.textContent = "Svátek";
        holidayInfoEl.textContent = namedays[key] || "Dnes není svátek uveden v přehledu.";
      }

      dayEl.textContent = dayName.charAt(0).toUpperCase() + dayName.slice(1);
      dateEl.textContent = dateText;
      timeEl.textContent = timeText;
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);
