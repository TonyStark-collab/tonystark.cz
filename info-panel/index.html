<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TonyStark.cz | Denní přehled</title>
  <meta name="description" content="Denní informace: den, datum, čas, státní svátek a svátek jmen." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080d18;
      --surface: #0f1728;
      --line: #1f2a44;
      --text: #f8fbff;
      --text-soft: #e9effd;
      --muted: #a2b0cb;
      --accent: #8bc2ff;
      --max: 920px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 10% 10%, #15233e 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      line-height: 1.45;
      padding: 20px 16px 48px;
      text-align: center;
    }

    .page {
      width: min(var(--max), 100%);
      margin: 0 auto;
      display: grid;
      gap: 28px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: color-mix(in srgb, var(--surface) 93%, #000 7%);
      padding: 10px;
    }

    .brand,
    .menu a {
      color: #dbe5ff;
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 9px;
      border: 1px solid transparent;
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .brand {
      color: var(--text);
      font-weight: 700;
    }

    .menu {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .brand:hover,
    .brand:focus-visible,
    .menu a:hover,
    .menu a:focus-visible {
      color: var(--text);
      border-color: var(--line);
      outline: none;
    }

    main {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(17, 25, 45, 0.95) 0%, rgba(9, 14, 27, 0.95) 100%);
      padding: clamp(20px, 5vw, 42px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.9rem, 5vw, 3rem);
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 10px 0 26px;
      font-size: clamp(1rem, 2.6vw, 1.2rem);
      color: #ced9f4;
    }

    .stack {
      display: grid;
      gap: 18px;
      text-align: left;
      max-width: 720px;
      margin: 0 auto;
    }

    .item {
      padding: 0;
      border: 0;
      background: transparent;
    }

    .label {
      display: block;
      text-transform: uppercase;
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 3px;
      font-weight: 700;
    }

    .value {
      margin: 0;
      color: var(--text-soft);
      font-size: clamp(1.35rem, 3.2vw, 2rem);
      line-height: 1.25;
      font-weight: 600;
      text-shadow: 0 0 18px rgba(138, 194, 255, 0.14);
    }

    #today-time {
      font-size: clamp(2.1rem, 9vw, 4.2rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      color: #ffffff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .weather-bar {
      margin-top: 8px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
      padding-top: 8px;
    }

    .weather-icon {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 2rem;
      background: radial-gradient(circle, rgba(139, 194, 255, 0.36) 0%, rgba(139, 194, 255, 0.08) 58%, transparent 100%);
      animation: float 3s ease-in-out infinite;
    }

    .weather-icon.sunny { animation: pulseSun 2.4s ease-in-out infinite; }
    .weather-icon.cloudy { animation: driftCloud 3.5s ease-in-out infinite; }
    .weather-icon.rainy { animation: rainBounce 1.3s ease-in-out infinite; }
    .weather-icon.snowy { animation: snowSpin 5s linear infinite; }
    .weather-icon.storm { animation: stormFlash 1.1s ease-in-out infinite; }

    .weather-meta {
      display: grid;
      gap: 4px;
    }

    .weather-temp {
      margin: 0;
      font-size: clamp(1.5rem, 3.6vw, 2.2rem);
      font-weight: 800;
      color: #ffffff;
      line-height: 1.1;
    }

    .weather-detail {
      margin: 0;
      color: #d4def8;
      font-size: 1.02rem;
      font-weight: 500;
    }

    .location-row {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .location-row label {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    select {
      appearance: none;
      border: 1px solid var(--line);
      background: #101a30;
      color: #f4f8ff;
      padding: 10px 34px 10px 12px;
      border-radius: 10px;
      font: inherit;
      font-size: 0.98rem;
      background-image:
        linear-gradient(45deg, transparent 50%, #9ec8ff 50%),
        linear-gradient(135deg, #9ec8ff 50%, transparent 50%);
      background-position:
        calc(100% - 16px) calc(50% - 2px),
        calc(100% - 10px) calc(50% - 2px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    .status {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes pulseSun {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.1); filter: brightness(1.18); }
    }

    @keyframes driftCloud {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }

    @keyframes rainBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }

    @keyframes snowSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes stormFlash {
      0%, 85%, 100% { filter: brightness(1); }
      90% { filter: brightness(1.4); }
    }

    @media (max-width: 700px) {
      .brand { width: 100%; }
      .stack { text-align: center; }
      .location-row,
      .weather-bar { justify-items: center; justify-content: center; }
      .location-row { justify-content: center; }
      .weather-bar { grid-template-columns: 1fr; text-align: center; }
    }
  </style>
</head>

    function updateDateTime() {
      const now = new Date();
      const key = `${now.getMonth() + 1}-${now.getDate()}`;
      const dayName = new Intl.DateTimeFormat("cs-CZ", { weekday: "long" }).format(now);
      const dateText = new Intl.DateTimeFormat("cs-CZ", {
        day: "numeric",
        month: "long",
        year: "numeric"
      }).format(now);
      const timeText = new Intl.DateTimeFormat("cs-CZ", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      }).format(now);

      const stateHoliday = stateHolidays[key];
      if (stateHoliday) {
        holidayLabelEl.textContent = "Státní svátek";
        holidayInfoEl.textContent = stateHoliday;
      } else {
        holidayLabelEl.textContent = "Svátek";
        holidayInfoEl.textContent = namedays[key] || "Dnes není svátek uveden v přehledu.";
      }

      dayEl.textContent = dayName.charAt(0).toUpperCase() + dayName.slice(1);
      dateEl.textContent = dateText;
      timeEl.textContent = timeText;
    }

      weatherIconEl.textContent = weather.icon;
      weatherIconEl.className = `weather-icon ${weather.cls}`;
      return weather.text;
    }

    async function fetchWeather() {
      const [latitude, longitude, city] = locationSelect.value.split(",");
      weatherStatusEl.textContent = `Načítám počasí pro ${city}…`;

      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code,wind_speed_10m&timezone=auto`;
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error("Nepodařilo se načíst data počasí.");
        }

        const payload = await response.json();
        const current = payload.current;

        if (!current) {
          throw new Error("Data počasí jsou neúplná.");
        }

        const description = applyWeatherAppearance(current.weather_code);
        weatherTempEl.textContent = `${Math.round(current.temperature_2m)} °C`;
        weatherDetailEl.textContent = `${description} • vítr ${Math.round(current.wind_speed_10m)} km/h`;

        const updatedAt = new Date(current.time).toLocaleTimeString("cs-CZ", {
          hour: "2-digit",
          minute: "2-digit"
        });
        weatherStatusEl.textContent = `Lokalita: ${city} • aktualizováno ${updatedAt}`;
      } catch (error) {
        weatherTempEl.textContent = "— °C";
        weatherDetailEl.textContent = "Počasí se nepodařilo načíst.";
        weatherIconEl.textContent = "⚠️";
        weatherIconEl.className = "weather-icon storm";
        weatherStatusEl.textContent = error.message;
      }
    }

    function setupWeather() {
      locationSelect.addEventListener("change", fetchWeather);
      fetchWeather();
      weatherRefreshTimer = setInterval(fetchWeather, 10 * 60 * 1000);
      window.addEventListener("beforeunload", () => clearInterval(weatherRefreshTimer));
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);
    setupWeather();
  </script>
</body>
</html>
